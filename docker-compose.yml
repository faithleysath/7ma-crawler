services:
  postgres:
    image: postgres:17
    container_name: sevenma-postgres
    environment:
      POSTGRES_DB: sevenma
      POSTGRES_USER: sevenma
      POSTGRES_PASSWORD: sevenma
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sevenma -d sevenma"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - sevenma_postgres_data:/var/lib/postgresql/data

volumes:
  sevenma_postgres_data:
